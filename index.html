<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GeoJSON to Table - Bootstrap</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      tr.stop-row td {
        background-color: #dc4c64 !important;
        color: white;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h4>Masukkan Data GeoJSON</h4>

          <textarea id="jsonInput" class="form-control" rows="10"></textarea>

          <div class="row mt-3">
            <div class="col-md-3">
              <label>Plat Nomor</label>
              <input type="text" id="licensePlate" class="form-control" />
            </div>
          </div>

          <div class="row mt-3">
            <div class="col-md-3">
              <label>Second</label>
              <div class="input-group">
                <input type="number" id="second" class="form-control" value="10" />
                <button class="btn btn-warning" onclick="regenerateSecond()">Generate</button>
              </div>
            </div>
          </div>

          <button class="btn btn-primary mt-3" onclick="convertToTable()">
            Generate Table
          </button>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <button class="btn btn-success mb-2" onclick="exportToTxt()">Export TXT</button>
          <div id="result"></div>
        </div>
      </div>
    </div>

    <script>
      let globalSeq = 1;

      function getNextSeq() {
        return globalSeq++;
      }

      function convertToTable() {
        globalSeq = 1;

        const data = JSON.parse(document.getElementById("jsonInput").value);
        const second = parseInt(document.getElementById("second").value);

        const coords = data.features[0].geometry.coordinates;

        let html = `
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>SEQ</th>
              <th>No</th>
              <th>Second</th>
              <th>Lat</th>
              <th>Lon</th>
              <th>Speed</th>
              <th>ACC</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
        `;

        let time = 0;

        coords.forEach((c, i) => {
          html += `
          <tr>
            <td class="seq">${getNextSeq()}</td>
            <td class="no">${i + 1}</td>
            <td><input class="second-input" value="${time}" /></td>
            <td class="lat">${c[1]}</td>
            <td class="lon">${c[0]}</td>
            <td><input class="speed-input" value="${i === 0 ? 0 : 50}" /></td>
            <td>
              <select class="acc-input">
                <option value="1">1</option>
                <option value="0" ${i === 0 ? "selected" : ""}>0</option>
              </select>
            </td>
            <td>
              <select onchange="handleAction(this)">
                <option value="">--</option>
                <option value="duplicate">Duplicate</option>
                <option value="delete">Delete</option>
                <option value="stop">Stop</option>
              </select>
            </td>
          </tr>
          `;
          time += second;
        });

        html += "</tbody></table>";
        document.getElementById("result").innerHTML = html;
      }

      function handleAction(el) {
        if (el.value === "duplicate") duplicateRow(el);
        if (el.value === "delete") deleteRow(el);
        if (el.value === "stop") stopRow(el);
        el.value = "";
      }

      function duplicateRow(el) {
        const row = el.closest("tr");
        const clone = row.cloneNode(true);

        clone.querySelector(".seq").innerText = getNextSeq();
        row.after(clone);

        updateNo();
        recalculateSeconds();
      }

      function deleteRow(el) {
        const row = el.closest("tr");
        row.remove();
        updateNo();
        recalculateSeconds();
      }

      function stopRow(el) {
        const row = el.closest("tr");
        const lat = row.querySelector(".lat").innerText;
        const lon = row.querySelector(".lon").innerText;

        const baseSecond = parseInt(row.querySelector(".second-input").value);
        const interval = parseInt(document.getElementById("second").value);

        const row1 = createStopRow(baseSecond, lat, lon, 1);
        const row2 = createStopRow(baseSecond + 120, lat, lon, 0);
        const row3 = createStopRow(baseSecond + 120 + interval, lat, lon, 1);

        row.replaceWith(row1, row2, row3);

        updateNo();
        recalculateSeconds();
      }

      function createStopRow(second, lat, lon, acc) {
        const tr = document.createElement("tr");
        tr.classList.add("stop-row");

        tr.innerHTML = `
          <td class="seq">${getNextSeq()}</td>
          <td class="no"></td>
          <td><input class="second-input" value="${second}" /></td>
          <td class="lat">${lat}</td>
          <td class="lon">${lon}</td>
          <td><input class="speed-input" value="0" /></td>
          <td>
            <select class="acc-input">
              <option value="1" ${acc === 1 ? "selected" : ""}>1</option>
              <option value="0" ${acc === 0 ? "selected" : ""}>0</option>
            </select>
          </td>
          <td>
            <select onchange="handleAction(this)">
              <option value="">--</option>
              <option value="duplicate">Duplicate</option>
              <option value="delete">Delete</option>
              <option value="stop">Stop</option>
            </select>
          </td>
        `;
        return tr;
      }

      function updateNo() {
        document.querySelectorAll("tbody tr").forEach((row, i) => {
          row.querySelector(".no").innerText = i + 1;
        });
      }

      function regenerateSecond() {
        const interval = parseInt(document.getElementById("second").value);

        document.querySelectorAll("tbody tr").forEach((row, i) => {
          row.querySelector(".second-input").value = i * interval;
        });
      }

      function recalculateSeconds() {
        const interval = parseInt(document.getElementById("second").value);
        let last = 0;

        document.querySelectorAll("tbody tr").forEach((row, i) => {
          if (row.classList.contains("stop-row")) {
            last = parseInt(row.querySelector(".second-input").value);
          } else {
            if (i === 0) {
              last = 0;
            } else {
              last += interval;
            }
            row.querySelector(".second-input").value = last;
          }
        });
      }

      function exportToTxt() {
        const rows = document.querySelectorAll("tbody tr");

        let txt = "seq,second,lon,lat\n";

        rows.forEach((row) => {
          txt += `${row.querySelector(".seq").innerText},`;
          txt += `${row.querySelector(".second-input").value},`;
          txt += `${row.querySelector(".lon").innerText},`;
          txt += `${row.querySelector(".lat").innerText}\n`;
        });

        const blob = new Blob([txt], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "export.txt";
        a.click();
      }
    </script>
  </body>
</html>
